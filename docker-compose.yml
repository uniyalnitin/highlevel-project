services:
  mongodb:
    image: mongo:7
    container_name: highlevel-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      target: dev
    container_name: highlevel-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/highlevel_db
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    volumes:
      - ./backend/src:/app/src          # hot reload
      - ./backend/package.json:/app/package.json
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: highlevel-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    volumes:
      - ./frontend/app:/app/app          # hot reload
      - ./frontend/public:/app/public
    depends_on:
      - backend

volumes:
  mongo_data:
